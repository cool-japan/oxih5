[advisories]
ignore = []

[licenses]
allow = ["Apache-2.0", "MIT", "ISC", "Unicode-3.0", "BSD-2-Clause", "BSD-3-Clause", "OpenSSL"]
unused-allowed-license = "allow"

[bans]
multiple-versions = "warn"
deny = [
    { name = "hdf5-sys" },
    { name = "libhdf5-sys" },
    { name = "hdf5-metno-sys" },
    { name = "hdf5-src" },
    { name = "netcdf-sys" },
    { name = "hdf5" },
    { name = "hdf5-metno" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
